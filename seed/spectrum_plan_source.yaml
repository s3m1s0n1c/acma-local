- ref: 564A
  text: 'For the operation of fixed and land mobile service applications in frequency bands in the range 275 – 450 GHz: The frequency bands 275 – 296 GHz, 306 – 313 GHz, 318 – 333 GHz and 356 – 450 GHz are identified for use by administrations for the implementation of land mobile and fixed service applications, where no specific conditions are necessary to protect Earth exploration-satellite service (passive) applications. The frequency bands 296 – 306 GHz, 313 – 318 GHz and 333 – 356 GHz may only be used by fixed and land mobile service applications when specific conditions to ensure the protection of Earth exploration – satellite service (passive) applications are determined in accordance with Resolution 731 (Rev.WRC-19). International Footnotes Part 4 In those portions of the frequency range 275 – 450 GHz where radio astronomy applications are used, specific conditions (e.g. minimum separation distances and/or avoidance angles) may be necessary to ensure protection of radio astronomy sites from land mobile and/or fixed service applications, on a case-by-case basis in accordance with Resolution 731 (Rev.WRC-19). The use of the above-mentioned frequency bands by land mobile and fixed service applications does not preclude use by, and does not establish priority over, any other applications of radio services in the range of 275-450 GHz. ( ) WRC-19'
  page: 213
- ref: '565'
  text: 'The following frequency bands in the range 275–1 000 GHz are identified for use by administrations for passive service applications: • radio astronomy service: 275–323 GHz, 327–371 GHz, 388–424 GHz, 426– 442 GHz, 453–510 GHz, 623–711 GHz, 795–909 GHz and 926–945 GHz; • Earth exploration–satellite service (passive) and space research service (passive): 275–286 GHz, 296–306 GHz, 313–356 GHz, 361–365 GHz, 369–392 GHz, 397– 399 GHz, 409–411 GHz, 416–434 GHz, 439–467 GHz, 477–502 GHz, 523– 527 GHz, 538–581 GHz, 611–630 GHz, 634–654 GHz, 657–692 GHz, 713– 718 GHz, 729–733 GHz, 750–754 GHz, 771–776 GHz, 823–846 GHz, 850– 854 GHz, 857–862 GHz, 866–882 GHz, 905–928 GHz, 951–956 GHz, 968– 973 GHz and 985–990 GHz. The use of the range 275–1 000 GHz by the passive services does not preclude use of this range by active services. Administrations wishing to make frequencies in the 275–1 000 GHz range available for active service applications are urged to take all practicable steps to protect these passive services from harmful interference until the date when the Table of Frequency Allocations is established in the above-mentioned 275–1 000 GHz frequency range. All frequencies in the range 1 000–3 000 GHz may be used by both active and passive services. ( ) WRC-12'
  page: 214
