  text: In the frequency band 399.9 – 400.05 MHz, the maximum e.i.r.p. of any emission of earth stations in the mobile – satellite service shall not exceed 5 dBW in any 4 kHz band and the maximum e.i.r.p. of each earth station in the mobile – satellite service shall not exceed 5 dBW in the whole 399.9 – 400.05 MHz frequency band. Until 22 November 2022, this limit shall not apply to satellite systems for which complete notification information has been received by the Radiocommunication Bureau by 22 November 2019 and that have been brought into use by that date. After 22 November 2022, these limits shall apply to all systems within the mobile – satellite service operating in this frequency band. In the frequency band 399.99 – 400.02 MHz, the e.i.r.p. limits as specified above shall apply after 22 November 2022 to all systems within the mobile – satellite service. Administrations are requested that their mobile – satellite service satellite links in the 399.99 – 400.02 MHz frequency band comply with the e.i.r.p. limits as specified above, after 22 November 2019. (WRC-19)
