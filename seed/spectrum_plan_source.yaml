- ref: 54A
  text: Use of the 8.3–11.3 kHz frequency band by stations in the meteorological aids service is limited to passive use only. In the band 9–11.3 kHz, meteorological aids stations shall not claim protection from stations of the radionavigation service submitted for notification to the Bureau prior to 1 January 2013. For sharing between stations of the meteorological aids service and stations in the radionavigation service submitted for notification after this date, the most recent version of Recommendation ITU-R RS.1881 should be applied.
