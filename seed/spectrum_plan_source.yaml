- ref: 551H
  text: 'The equivalent power flux-density (epfd) produced in the frequency band 42.5– 43.5 GHz by all space stations in any non-geostationary-satellite system in the fixed– satellite service (space-to-Earth), or in the broadcasting–satellite service operating in the frequency band 42–42.5 GHz, shall not exceed the following values at the site of any radio astronomy station for more than 2% of the time: −230 dB(W/m 2 ) in 1 GHz and −246 dB(W/m 2 ) in any 500 kHz of the frequency band 42.5–43.5 GHz at the site of any radio astronomy station registered as a single-dish telescope; and −209 dB(W/m 2 ) in any 500 kHz of the frequency band 42.5–43.5 GHz at the site of any radio astronomy station registered as a very long baseline interferometry station. These epfd values shall be evaluated using the methodology given in Recommendation ITU-R S.1586-1 and the reference antenna pattern and the maximum gain of an antenna in the radio astronomy service given in Recommendation ITU-R RA.1631-0 and shall apply over the whole sky and for elevation angles higher than the minimum operating angle θmin of the radiotelescope (for which a default value of 5° should be adopted in the absence of notified information). These values shall apply at any radio astronomy station that either: • was in operation prior to 5 July 2003 and has been notified to the Bureau before 4 January 2004; or • was notified before the date of receipt of the complete Appendix 4 information for coordination or notification, as appropriate, for the space station to which the limits apply. Other radio astronomy stations notified after these dates may seek an agreement with administrations that have authorised the space stations. In Region 2, Resolution 743 (WRC-03) shall apply. The limits in this footnote may be exceeded at the site of a radio astronomy station of any country whose administration so agreed. ( ) WRC-15'
  page: 208
- ref: 551I
  text: 'The power flux-density in the band 42.5–43.5 GHz produced by any geostationary space station in the fixed–satellite service (space-to-Earth), or the broadcasting–satellite service operating in the 42–42.5 GHz band, shall not exceed the following values at the site of any radio astronomy station: • −137 dB(W/m 2 ) in 1 GHz and −153 dB(W/m 2 ) in any 500 kHz of the 42.5– 43.5 GHz band at the site of any radio astronomy station registered as a single-dish telescope; and • −116 dB(W/m 2 ) in any 500 kHz of the 42.5–43.5 GHz band at the site of any radio astronomy station registered as a very long baseline interferometry station. These values shall apply at the site of any radio astronomy station that either: • was in operation prior to 5 July 2003 and has been notified to the Bureau before 4 January 2004; or • was notified before the date of receipt of the complete Appendix 4 information for coordination or notification, as appropriate, for the space station to which the limits apply. Other radio astronomy stations notified after these dates may seek an agreement with administrations that have authorised the space stations. In Region 2, Resolution 743 (WRC-03) shall apply. The limits in this footnote may be exceeded at the site of a radio astronomy station of any country whose administration so agreed. ( ) WRC-07'
  page: 209
