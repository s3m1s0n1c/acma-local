  text: Radio astronomy facilities operated by the CSIRO at the Paul Wild Observatory Narrabri (latitude 30° 18' 46.40" S, longitude 149° 33' 0.44" E), the Parkes Observatory (latitude 32° 59' 54.25" S, longitude 148° 15' 48.65" E) and the Mopra Observatory Coonabarabran (latitude 31° 16' 04.12" S, longitude 149° 05' 58.72" E) and by the University of Tasmania at the Mount Pleasant Observatory Hobart (latitude 42° 48' 12.92" S, longitude 147° 26' 25.86" E) and the Ceduna Observatory (latitude 31° 52' 03.69" S, longitude 133° 48' 35.40" E), and at the Canberra Deep Space Communication Complex (latitude 35° 23' 54.46" S, longitude 148° 58' 39.66" E) conduct passive observations in the frequency bands 1.2–1.8 GHz, 2.2–2.7 GHz, 4.5–6.7 GHz, 8–10 GHz and 16–26 GHz using receivers that are highly sensitive to interference. The Paul Wild and Mopra observatories also operate in the bands 30– 50 GHz and 75–115 GHz.
