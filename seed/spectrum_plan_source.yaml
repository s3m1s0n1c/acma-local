  text: In the frequency band 401 – 403 MHz, the maximum e.i.r.p. of any emission of each earth station in the meteorological-satellite service and the Earth exploration-satellite service shall not exceed 22 dBW in any 4 kHz band for geostationary-satellite systems and non-geostationary-satellite systems with an orbit of apogee equal or greater than 35 786 km. The maximum e.i.r.p. of any emission of each earth station in the meteorological- satellite service and the Earth exploration-satellite service shall not exceed 7 dBW in any 4 kHz band for non-geostationary-satellite systems with an orbit of apogee lower than 35 786 km. The maximum e.i.r.p. of each earth station in the meteorological-satellite service and the Earth exploration-satellite service shall not exceed 22 dBW for geostationary- satellite systems and non-geostationary-satellite systems with an orbit of apogee equal or greater than 35 786 km in the whole 401-403 MHz frequency band. The maximum e.i.r.p. of each earth station in the meteorological-satellite service and the Earth exploration-satellite service shall not exceed 7 dBW for non-geostationary-satellite systems with an orbit of apogee lower than 35 786 km in the whole 401-403 MHz frequency band. Until 22 November 2029, these limits shall not apply to satellite systems for which complete notification information has been received by the Radiocommunication Bureau by 22 November 2019 and that have been brought into use by that date. After 22 November 2029, these limits shall apply to all systems within the meteorological- satellite service and the Earth exploration-satellite service operating in this frequency band. (WRC-19)
