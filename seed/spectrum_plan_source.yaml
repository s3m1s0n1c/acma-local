- ref: '58'
  text: 'Additional allocation: in Armenia, Azerbaijan, Georgia, Kazakhstan, Kyrgyzstan, the Russian Federation, Tajikistan and Turkmenistan, the band 67–70 kHz is also allocated to the radionavigation service on a primary basis. ( ) WRC-2000'
