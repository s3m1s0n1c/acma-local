- ref: '61'
  text: In Region 2, the establishment and operation of stations in the maritime radionavigation service in the bands 70–90 kHz and 110–130 kHz shall be subject to agreement obtained under No. 9.21 with administrations whose services, operating in accordance with the Table, may be affected. However, stations of the fixed, maritime mobile and radiolocation services shall not cause harmful interference to stations in the maritime radionavigation service established under such agreements.
