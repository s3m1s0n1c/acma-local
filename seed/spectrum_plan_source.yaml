  text: The use of the bands 14–19.95 kHz, 20.05–70 kHz and 70–90 kHz (72–84 kHz and 86– 90 kHz in Region 1) by the maritime mobile service is limited to coast radiotelegraph stations (A1A and F1B only). Exceptionally, the use of class J2B or J7B emissions is authorised subject to the necessary bandwidth not exceeding that normally used for class A1A or F1B emissions in the band concerned.
