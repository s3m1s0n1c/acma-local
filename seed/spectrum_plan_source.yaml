- ref: AUS98
  text: 'The harmonised frequency ranges in the 400 MHz band are used for national security, law enforcement, and first and second responder agencies. These agencies include police, fire, ambulance, and emergency rescue. These agencies are normally consulted about use of this spectrum for government purposes via the Commonwealth, State and Territory representative arrangements established by the National Coordinating Committee for Government Radiocommunications 2 . The harmonised band comprises the following frequency ranges: 403–403.98125 MHz, 405.01875–406 MHz, 408.64375–410.54375 MHz, 412.46875–413.43125 MHz, 414.46875–415.44375 MHz, 418.09375–430 MHz, 457.50625–459.9875 MHz, 467.50625–469.9875 MHz. 2 The National Coordinating Committee for Government Radiocommunications (NCCGR) is a standing representative committee of the National Emergency Management Committee and was established by agreement of First Ministers in 2004 and replaced the Inter-Government Spectrum Harmonisation Committee (ISHC). It was formed to support a national will to address the core issues of spectrum and inter-jurisdictional operations and to ensure that the relevant issues are considered and discussed within a national framework. The NCCGR consists of representatives from Australian jurisdictions and Australian Government Departments and has been formed with the endorsement of jurisdiction Premiers/Chief Ministers (see Preamble, Constitution of the NCCGR March 2012). Part 3'
  page: 117
