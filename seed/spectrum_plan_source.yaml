- ref: '60'
  text: In the bands 70–90 kHz (70–86 kHz in Region 1) and 110–130 kHz (112–130 kHz in Region 1), pulsed radionavigation systems may be used on condition that they do not cause harmful interference to other services to which these bands are allocated.
