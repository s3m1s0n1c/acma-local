- ref: '547'
  text: The bands 31.8–33.4 GHz, 37–40 GHz, 40.5–43.5 GHz, 51.4–52.6 GHz, 55.78– 59 GHz and 64–66 GHz are available for high-density applications in the fixed service (see Resolution 75 (WRC-2000)). Administrations should take this into account when considering regulatory provisions in relation to these bands. Because of the potential deployment of high-density applications in the fixed–satellite service in the bands 39.5– 40 GHz and 40.5–42 GHz (see No. 516B), administrations should further take into account potential constraints to high-density applications in the fixed service, as appropriate. ( ) WRC-07
