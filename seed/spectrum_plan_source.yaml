  text: In the band 35.5–36.0 GHz, the mean power flux-density at the Earth’s surface, generated by any spaceborne sensor in the Earth exploration–satellite service (active) or space research service (active), for any angle greater than 0.8° from the beam centre shall not exceed −73.3 dB(W/m 2 ) in this band. ( ) WRC-03
