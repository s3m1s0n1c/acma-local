- ref: 550B
  text: The frequency band 37 – 43.5 GHz, or portions thereof, is identified for use by administrations wishing to implement the terrestrial component of International Mobile Telecommunications (IMT). This identification does not preclude the use of this frequency band by any application of the services to which it is allocated and does not establish priority in the Radio Regulations. Because of the potential deployment of FSS earth stations within the frequency range 37.5 – 42.5 GHz and high-density applications in the fixed – satellite service in the frequency bands 39.5 – 40 GHz in Region 1, 40 – 40.5 GHz in all Regions and 40.5 – 42 GHz in Region 2 (see No. 516B), administrations should further take into account potential constraints to IMT in these frequency bands, as appropriate. Resolution 243 (WRC-19) applies. ( ) WRC-19
  page: 208
- ref: 550C
  text: The use of the frequency bands 37.5 – 39.5 GHz (space-to-Earth), 39.5 – 42.5 GHz (space- to-Earth), 47.2 – 50.2 GHz (Earth-to-space) and 50.4 – 51.4 GHz (Earth-to-space) by a non-geostationary-satellite system in the fixed – satellite service is subject to the application of the provisions of No. 9.12 for coordination with other non-geostationary- satellite systems in the fixed – satellite service but not with non-geostationary-satellite systems in other services. Resolution 770 (WRC-19) shall also apply, and No. 22.2 shall continue to apply. ( ) WRC-19
  page: 208
- ref: 550D
  text: The allocation to the fixed service in the frequency band 38 – 39.5 GHz is identified for worldwide use by administrations wishing to implement high-altitude platform stations (HAPS). In the HAPS-to-ground direction, the HAPS ground station shall not claim protection from stations in the fixed, mobile and fixed – satellite services; and No. 43A does not apply. This identification does not preclude the use of this frequency band by other fixed-service applications or by other services to which this frequency band is allocated on a co-primary basis and does not establish priority in the Radio Regulations. Furthermore, the development of the fixed – satellite, fixed and mobile services shall not be unduly constrained by HAPS. Such use of the fixed-service allocation by HAPS shall be in accordance with the provisions of Resolution 168 (WRC-19). ( ) WRC-19
  page: 208
- ref: 550E
  text: The use of the frequency bands 39.5 – 40 GHz and 40 – 40.5 GHz by non-geostationary- satellite systems in the mobile – satellite service (space-to-Earth) and by non- geostationary-satellite systems in the fixed – satellite service (space-to-Earth) is subject to the application of the provisions of No. 9.12 for coordination with other non- geostationary-satellite systems in the fixed – satellite and mobile – satellite services but not with non-geostationary-satellite systems in other services. No. 22.2 shall continue to apply for non-geostationary-satellite-systems. ( ) WRC-19
