  text: 'Additional allocation: in Algeria, Saudi Arabia, Bahrain, Egypt, the United Arab Emirates, the Russian Federation, Iran (Islamic Republic of), Iraq, Kuwait, Lebanon, Morocco, Qatar, the Syrian Arab Republic, Sudan and Tunisia, the frequency band 8.3– 9 kHz is also allocated to the radionavigation, fixed and mobile services on a primary basis. ( ) WRC-15'
