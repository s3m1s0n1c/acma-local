- ref: '56'
  text: The stations of services to which the bands 14–19.95 kHz and 20.05–70 kHz and in Region 1 also the bands 72–84 kHz and 86–90 kHz are allocated may transmit standard frequency and time signals. Such stations shall be afforded protection from harmful interference. In Armenia, Azerbaijan, Belarus, the Russian Federation, Georgia, Kazakhstan, Kyrgyzstan, Tajikistan and Turkmenistan, the frequencies 25 kHz and 50 kHz will be used for this purpose under the same conditions. ( ) WRC-12
