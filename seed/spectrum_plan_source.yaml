  text: 'Additional allocation: in Algeria, Armenia, Azerbaijan, Belarus, China, the Russian Federation, France, Iran (Islamic Republic of), Kazakhstan, Uzbekistan, Kyrgyzstan, Tajikistan, Turkmenistan, Ukraine and Viet Nam, the frequency band 154–156 MHz is also allocated to the radiolocation service on a primary basis. The usage of the frequency band 154–156 MHz by the radiolocation service shall be limited to space- object detection systems operating from terrestrial locations. The operation of stations in the radiolocation service in the frequency band 154–156 MHz shall be subject to agreement obtained under No. 9.21. For the identification of potentially affected administrations in Region 1, the instantaneous field-strength value of 12 dB(μV/m) for 10% of the time produced at 10 m above ground level in the 25 kHz reference frequency band at the border of the territory of any other administration shall be used. For the identification of potentially affected administrations in Region 3, the interference-to- noise ratio (I/N) value of −6 dB (N = −161 dBW/4 kHz), or −10 dB for applications with greater protection requirements, such as public protection and disaster relief (PPDR (N = −161 dBW/4 kHz)), for 1% of the time produced at 60 m above ground level at the border of the territory of any other administration shall be used. In the frequency bands 156.7625–156.8375 MHz, 156.5125–156.5375 MHz, 161.9625– 161.9875 MHz, 162.0125–162.0375 MHz, out-of-band e.i.r.p. of space surveillance radars shall not exceed −16 dBW. Frequency assignments to the radiolocation service under this allocation in Ukraine shall not be used without the agreement of Moldova.'
