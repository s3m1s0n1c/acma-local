  text: In the bands 94–94.1 GHz and 130–134 GHz, transmissions from space stations of the Earth exploration–satellite service (active) that are directed into the main beam of a radio astronomy antenna have the potential to damage some radio astronomy receivers. Space agencies operating the transmitters and the radio astronomy stations concerned should mutually plan their operations so as to avoid such occurrences to the maximum extent possible. ( ) WRC-2000
