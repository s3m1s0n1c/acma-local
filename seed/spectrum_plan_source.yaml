  text: 'Different category of service: in Saudi Arabia, Armenia, Azerbaijan, Bahrain, Belarus, Egypt, the United Arab Emirates, Spain, Estonia, the Russian Federation, Georgia, Hungary, Iran (Islamic Republic of), Israel, Jordan, Lebanon, Moldova, Mongolia, Oman, Uzbekistan, Poland, the Syrian Arab Republic, Kyrgyzstan, Romania, the United Kingdom, South Africa, Tajikistan, Turkmenistan and Turkey, the allocation of the frequency band 31.5–31.8 GHz to the fixed and mobile, except aeronautical mobile, services is on a primary basis (see No. 33). (WRC-19)'
