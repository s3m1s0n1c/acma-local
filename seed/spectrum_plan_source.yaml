  text: 'Additional allocation: in Armenia, the Russian Federation, Georgia, Kyrgyzstan, Tajikistan, and Turkmenistan, the frequency band 14–17 kHz is also allocated to the radionavigation service on a primary basis. ( ) WRC-15'
