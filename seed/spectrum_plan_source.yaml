  text: The allocation of the spectrum for the fixed–satellite service in the bands 42.5– 43.5 GHz and 47.2–50.2 GHz for Earth-to-space transmission is greater than that in the International Footnotes Part 4 band 37.5–39.5 GHz for space-to-Earth transmission in order to accommodate feeder links to broadcasting satellites. Administrations are urged to take all practicable steps to reserve the band 47.2–49.2 GHz for feeder links for the broadcasting–satellite service operating in the band 40.5–42.5 GHz.
